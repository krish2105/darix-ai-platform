name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  # Placeholder values so build/e2e steps don't need real infra — real
  # secrets are only required at deploy time (see DEPLOYMENT.md). E2E
  # tests intercept API calls, so a live Supabase project isn't needed.
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  rls:
    # Runs the RLS regression suite (rls-tests/) against a real local
    # Supabase stack — see rls-tests/README.md for why this is a separate
    # job from unit-tests rather than folded into `npm test`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v3
        with:
          version: latest
      - run: npm run test:rls

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  lighthouse:
    # Budget gate: fails the build if performance/accessibility/best-practices/
    # SEO regress below lighthouserc.json's thresholds, on a handful of
    # representative pages (home, plus two static legal pages as a proxy for
    # every other mostly-static route). ubuntu-latest ships Chrome
    # preinstalled, which @lhci/cli's chrome-launcher finds automatically —
    # no separate browser setup step needed. Thresholds are deliberately
    # lenient on performance (CI runners are CPU-throttled vs. real devices)
    # so this catches genuine regressions, not runner noise.
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx @lhci/cli@0.14.x autorun
